<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main>
        <h1>Welcome, {{ username }}!</h1>
        <h2>Scan a Website</h2>

        <form action="/scan" method="POST">
            <label for="url">Enter website URL:</label><br>
            <input type="text" id="url" name="url" placeholder="https://example.com" required><br><br>

            <button type="submit">Scan Website</button>
        </form>
        
        <h1>View statistics of scanned websites</h1>
        <p><a href="/stats">View Statistics</a></p>

        <h1>Options</h1>
        <p><a href="/history">Scan History</a></p>
        <p><a href="/logout">Logout</a></p>



    </main>
</body>
</html>
