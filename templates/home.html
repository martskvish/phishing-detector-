<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        #bar {
            width: 100%;
            height: 8px;
            background-color: #ddd;
            border-radius: 4px;
            margin: 20px 0;
            display: none;
            overflow: hidden;
        }
        #fill {
            height: 100%;
            width: 0%;
            background-color: #20532b;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <main>
        <h1>Welcome, {{ username }}!</h1>
        <h2>Scan a Website</h2>

        <form onsubmit="startScan(event)">
            <label for="url">Enter website URL:</label><br>
            <input type="text" id="url" name="url" placeholder="https://example.com" required><br><br>
            <button type="submit" id="btn">Scan Website</button>
        </form>

        <div id="bar"><div id="fill"></div></div>
        <p id="scan-status"></p>

        <h1>Statistics of scanned websites by month</h1>
        <p><a href="/stats">View Statistics</a></p>

        <h1>Options</h1>
        <p><a href="/history">Scan History</a></p>
        <p><a href="/settings">User settings</a></p>
        <p><a href="/logout">Logout</a></p>
    </main>

    <script>
function startScan(e) {
    e.preventDefault();

    const url = document.getElementById("url").value;

    document.getElementById("bar").style.display = "block";
    document.getElementById("btn").disabled = true;

    const steps = {
        "Starting scan": 10,
        "Decomposing URL": 20,
        "Extracting and analysing HTML content": 40,
        "Analysing domain, subdomain, path and protocol": 55,
        "Performing WHOIS lookup": 70,
        "Analysing SSL certificate": 80,
        "Extracting IP information": 90,
        "DONE": 100
    };

    fetch("/scan", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "url=" + encodeURIComponent(url)
    })
    .then(response => {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        function read() {
            reader.read().then(({ done, value }) => {

                if (done) return;

                const text = decoder.decode(value);
                const lines = text.split("\n");

                lines.forEach(line => {

                    if (line.startsWith("data: ")) {

                        const msg = line.replace("data: ", "").trim();

                        console.log(msg);

                        document.getElementById("scan-status").textContent = msg;

                        if (steps[msg] !== undefined) {
                            document.getElementById("fill").style.width = steps[msg] + "%";
                        }

                        if (msg === "DONE") {
                            setTimeout(() => {
                                window.location.href = "/scan_result";
                            }, 300);
                            return;
                        }
                    }
                });

                read();
            });
        }

        read();
    });
}
    </script>
</body>
</html>
