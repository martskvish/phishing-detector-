<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        #bar {
            width: 100%;
            height: 8px;
            background-color: #ddd;
            border-radius: 4px;
            margin: 20px 0;
            display: none;
            overflow: hidden;
        }
        #fill {
            height: 100%;
            width: 0%;
            background-color: #4CAF50;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <main>
        <h1>Welcome, {{ username }}!</h1>
        <h2>Scan a Website</h2>

        <form onsubmit="startScan(event)">
            <label for="url">Enter website URL:</label><br>
            <input type="text" id="url" name="url" placeholder="https://example.com" required><br><br>
            <button type="submit" id="btn">Scan Website</button>
        </form>

        <div id="bar"><div id="fill"></div></div>
        <p id="scan-status"></p>

        <h1>Statistics of scanned websites by month</h1>
        <p><a href="/stats">View Statistics</a></p>

        <h1>Options</h1>
        <p><a href="/history">Scan History</a></p>
        <p><a href="/settings">User settings</a></p>
        <p><a href="/logout">Logout</a></p>
    </main>

    <script>
        function startScan(e) {
            e.preventDefault();
            const url = document.getElementById("url").value;
            document.getElementById("bar").style.display = "block";
            document.getElementById("btn").disabled = true;

            let width = 10;

            const interval = setInterval(() => {
                width = Math.min(width + Math.random() * 30, 90);
                document.getElementById("fill").style.width = width + "%";
            }, 300);

            fetch("/scan", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "url=" + encodeURIComponent(url)
            })
            .then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                function read() {
                    reader.read().then(({ done, value }) => {
                        if (done) return;
                        const lines = decoder.decode(value).split("\n").filter(l => l.startsWith("data: "));
                        lines.forEach(line => {
                            const msg = line.replace("data: ", "").trim();

                            console.log("scan message:", msg);
                            if (msg === "DONE") {
                                clearInterval(interval);
                                document.getElementById("fill").style.width = "100%";
                                setTimeout(() => {
                                    window.location.href = "/scan_result";
                                }, 200);
                                return;
                            }
                            document.getElementById("scan-status").textContent = msg;
                        });
                        read();
                    });
                }
                read();
            });
        }
    </script>
</body>
</html>
