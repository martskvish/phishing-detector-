<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <main>
        <h1>Settings for {{ username }}</h1>
        <h2>Reset Password</h2>

        {% if message %}
            <p style="color: red;">{{ message }}</p>
        {% endif %}

        <form action="/settings" method="POST">
            <label for="old_password">Enter current password</label><br>
            <input type="text" id="old_password" name="old_password" placeholder="Enter current password" required><br><br>

            <label for="new_password">Enter new password</label><br>
            <input type="text" id="new_password" name="new_password" placeholder="Enter new password" required><br><br>

            <button type="submit" name="form_type" value="change_password">Reset Password</button>
        </form>

        <h2>Settings for previous scan period</h2>
        <form action="/settings" method="POST">
            <label for="new_scan_period">Set the number of days for which a previous scan is considered valid (default is 3 days)</label><br>
            <input type="number" id="new_scan_period" name="new_scan_period" placeholder="Enter number of days" required><br><br>

            <button type="submit" name="form_type" value="previous_scan_period">Update previous scan period</button>
        
        
        </form>

        <a href="/home">Back to Home</a>
       



    </main>
</body>
</html>
